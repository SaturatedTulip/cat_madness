<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Madness Tournament</title>
    <script>
        // Caching functions
        const getCacheKey = () => 'tournament_cache';
        const isCacheValid = (timestamp) => {
            const expirationTime = 24 * 60 * 60 * 1000; // 24 hours
            return (Date.now() - timestamp) < expirationTime;
        };

        const saveToCache = (data) => {
            localStorage.setItem(getCacheKey(), JSON.stringify(data));
            localStorage.setItem(`${getCacheKey()}_timestamp`, Date.now());
        };

        const loadFromCache = () => {
            const cachedData = JSON.parse(localStorage.getItem(getCacheKey()));
            const timestamp = localStorage.getItem(`${getCacheKey()}_timestamp`);
            return isCacheValid(parseInt(timestamp)) ? cachedData : null;
        };

        const clearExpiredCache = () => {
            const timestamp = localStorage.getItem(`${getCacheKey()}_timestamp`);
            if (timestamp && !isCacheValid(parseInt(timestamp))) {
                localStorage.removeItem(getCacheKey());
                localStorage.removeItem(`${getCacheKey()}_timestamp`);
            }
        };

        const clearAllCache = () => {
            localStorage.removeItem(getCacheKey());
            localStorage.removeItem(`${getCacheKey()}_timestamp`);
        };

        const loadTournamentData = async () => {
            clearExpiredCache();  // Clear expired cache
            let data = loadFromCache();  // Load data from cache

            if (!data) {
                // Fetch data from API
                const response = await fetch('API_ENDPOINT_HERE');  // replace with actual API endpoint
                data = await response.json();
                saveToCache(data);  // Save fetched data to cache
            }

            // Process the tournament data
            processTournamentData(data);
        };

        const processTournamentData = (data) => {
            // Logic to update UI with tournament data
        };

        const setupClearCacheButton = () => {
            const button = document.createElement('button');
            button.innerText = 'Clear Cache';
            button.onclick = () => {
                clearAllCache();
                alert('Cache cleared!');
            };
            document.body.appendChild(button);
        };

        document.addEventListener('DOMContentLoaded', () => {
            setupClearCacheButton();
            loadTournamentData();
        });
    </script>
</head>
<body>
    <h1>Welcome to the Cat Madness Tournament!</h1>
    <div id="tournament-data">
        <!-- Tournament data will be loaded here -->
    </div>
</body>
</html>
